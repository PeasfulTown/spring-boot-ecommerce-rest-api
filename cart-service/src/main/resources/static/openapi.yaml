openapi: 3.0.1
info:
  title: E-Commerce Cart Service
  description: |
    Handles the user cart management part of the e-commerce microservices platform
  contact:
    email: emrin4@gmail.com
  license:
    name: MIT
    url: https://mit-license.org/
  version: 0.0.1

tags:
  - name: cart
    description: User cart management

paths:
  /api/v1/cart:
    get:
      tags: [ cart ]
      summary: Get user's cart
      operationId: getCart
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          $ref: '#/components/responses/Cart'

    delete:
      tags: [ cart ]
      summary: Clear user's cart
      operationId: clearCart
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '204':
          description: Successful clear
          content: {}

  /api/v1/cart/checkout:
    post:
      tags: [ cart ]
      summary: Send cart as order
      operationId: checkout
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        $ref: '#/components/requestBodies/CheckoutCart'
      responses:
        '202':
          description: Sent to messaging queue to process order
          content: {}
        '400':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/cart/items:
    post:
      tags: [ cart ]
      summary: Add item to cart
      operationId: createCartItem
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        $ref: '#/components/requestBodies/CreateCartItem'
      responses:
        '200':
          $ref: '#/components/responses/CartItem'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/cart/items/{itemId}:
    patch:
      tags: [ cart ]
      summary: Update item's quantity in cart
      operationId: updateItemQuantity
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        $ref: '#/components/requestBodies/UpdateCartItemQuantity'
      responses:
        '200':
          $ref: '#/components/responses/CartItem'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    delete:
      tags: [ cart ]
      summary: Remove item from user's cart
      operationId: removeCartItem
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '204':
          description: Item removal successful
          content: {}
        '404':
          $ref: '#/components/responses/ProblemDetail'

components:

  parameters:

    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string

    UserRoleHeader:
      name: X-User-Role
      in: header
      required: true
      schema:
        type: string
        enum:
          - ADMIN
          - CUSTOMER

    ItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: string

  requestBodies:

    CreateCartItem:
      description: Request body with product ID and quantity to add to cart
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ItemCreateRequest'

    UpdateCartItemQuantity:
      description: Update item quantity request object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ItemQuantityUpdateRequest'

    CheckoutCart:
      description: Cart information and user information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CartCheckoutRequest'

  responses:

    ProblemDetail:
      description: Api error detail response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Cart:
      description: Cart object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Cart'

    CartItem:
      description: Cart item object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CartItem'

  schemas:

    ProblemDetail:
      type: object
      properties:
        title:
          type: string
          example: "Not Found"
        status:
          type: integer
          example: 404
        detail:
          type: string
          example: "Order not found with id: 123"
        instance:
          type: string
          format: uri
          example: "/api/v1/orders/123"
      required: [ status ]

    Cart:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        totalItems:
          type: integer
          format: int32
        totalPrice:
          type: BigDecimal
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartItem:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        productName:
          type: string
        productPrice:
          type: BigDecimal
        quantity:
          type: integer
          format: int32
        subtotal:
          type: BigDecimal

    StockStatus:
      type: string
      enum:
        - IN_STOCK
        - OUT_OF_STOCK
        - LOW_STOCK

    ActiveStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE

    Product:
      type: object
      description: The product object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: BigDecimal
        imageUrls:
          type: array
          items:
            type: string
        stockStatus:
          $ref: '#/components/schemas/StockStatus'
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'

    ItemCreateRequest:
      type: object
      required: [ productId, quantity ]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          format: int32

    ItemQuantityUpdateRequest:
      type: object
      required: [ quantity ]
      properties:
        quantity:
          type: integer
          format: int32

    CartCheckoutRequest:
      type: object
      required: [ addressId, cardId ]
      properties:
        addressId:
          type: string
        cardId:
          type: string
