spring:
  profiles.active: ${ACTIVE_PROFILE}

  application:
    name: CartService

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_POST:5672}
    virtual-host: /
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    template:
      default-exchange: ${RABBITMQ_DEFAULT_EXCHANGE}

services:
  internal-secret: ${SERVICES_INTERNAL_SECRET}
  product-service:
    url: ${PRODUCT_SERVICE_URL}
  user-service:
    url: ${USER_SERVICE_URL}

server.port: 8083
