spring:
  profiles.active: ${ACTIVE_PROFILE}
  application:
    name: CartService
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration

services.product-service-url: ${PRODUCT_SERVICE_URL}

server.port: 8083
