openapi: 3.0.1
info:
  title: E-Commerce Product Service
  description: |
    Handles the product catalogue management part of the e-commerce 
    microservices platform
  contact:
    email: emrin4@gmail.com
  license:
    name: MIT
    url: https://mit-license.org/
  version: 0.0.1

tags:
  - name: product
    description: Product catalogue management, query, add, update, delete product
  - name: category
    description: Product category, can query for products by categories

paths:

  /api/v1/products:

    get:
      tags: [ product ]
      summary: Lists products with optional filters
      operationId: queryProducts
      parameters:
        - $ref: '#/components/parameters/ProductNameQuery'
        - $ref: '#/components/parameters/CategoryQuery'
        - $ref: '#/components/parameters/MinPriceQuery'
        - $ref: '#/components/parameters/MaxPriceQuery'
        - $ref: '#/components/parameters/StockStatusQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortDirectionQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PagedProduct'

    post:
      tags: [ product ]
      summary: Add new product to the store (admin)
      operationId: addProduct
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      requestBody:
        $ref: '#/components/requestBodies/CreateProduct'
      responses:
        '201':
          $ref: '#/components/responses/SingleProduct'

  /api/v1/products/batch:
    post:
      tags: [ product ]
      summary: Get products
      operationId: getProductBatchById
      requestBody:
        $ref: '#/components/requestBodies/BatchProductId'
      responses:
        '200':
          $ref: '#/components/responses/BatchProduct'


  /api/v1/products/{productId}:
    get:
      tags: [ product ]
      summary: Get product by its ID
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleProduct'
        '404':
          $ref: '#/components/responses/Error'

    patch:
      tags: [ product ]
      summary: Update product properties (admin)
      operationId: updateProductById
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/ProductIdPath'
      requestBody:
        $ref: '#/components/requestBodies/UpdateProduct'
      responses:
        '200':
          $ref: '#/components/responses/SingleProduct'
        '404':
          $ref: '#/components/responses/Error'

    delete:
      tags: [ product ]
      summary: Delete a product by ID (admin)
      operationId: deleteProductById
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '204':
          description: Successfully deleted product, no content
          content: {}
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/categories:
    get:
      tags: [ category ]
      summary: Get all product categories
      operationId: getAllCategories
      responses:
        '200':
          description: Successfully fetch all information about existing 
            categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags: [ category ]
      summary: Create a new product category (admin)
      operationId: createCategory
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      requestBody:
        description: New category creation request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Successful product category creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/Error'

  /api/v1/categories/{categoryId}:
    patch:
      tags: [ category ]
      summary: Update category information (admin)
      operationId: updateCategoryById
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/CategoryIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: Successful category information update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

    delete:
      tags: [ category ]
      summary: Delete a category by ID (admin)
      operationId: deleteCategoryById
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/CategoryIdPath'
      responses:
        '204':
          description: Successful deletion, returns nothing
          content: {}
        '404':
          description: Can't find category by provided ID
          $ref: '#/components/responses/Error'

  /api/v1/categories/{categoryId}/products:
    get:
      tags: [ category ]
      summary: Get all products of a particular category
      operationId: getProductsByCategoryId
      parameters:
        - $ref: '#/components/parameters/CategoryIdPath'
      responses:
        '200':
          $ref: '#/components/responses/BatchProduct'
        '404':
          $ref: '#/components/responses/Error'

components:

  parameters:

    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string

    UserRoleHeader:
      name: X-User-Role
      in: header
      required: true
      schema:
        type: string
        enum:
          - ADMIN
          - CUSTOMER

    ProductIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: string

    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema:
        type: string

    PageNumberQuery:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0

    PageSizeQuery:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 10

    StockStatusQuery:
      name: stockStatus
      in: query
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/StockStatus'

    SortByQuery:
      name: sortBy
      in: query
      schema:
        type: string
        enum:
          - name
          - category
          - price

    SortDirectionQuery:
      name: sortDir
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc

    ProductNameQuery:
      name: productName
      in: query
      required: false
      schema:
        type: string

    CategoryQuery:
      name: category
      in: query
      required: false
      schema:
        type: string

    MinPriceQuery:
      name: minPrice
      in: query
      required: false
      schema:
        type: BigDecimal

    MaxPriceQuery:
      name: maxPrice
      in: query
      required: false
      schema:
        type: BigDecimal

  requestBodies:

    CreateProduct:
      description: New product creation request object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductCreateRequest'

    UpdateProduct:
      description: Update request object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductUpdateRequest'

    BatchProductId:
      description: A batch of product IDs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchProductIdRequest'

  responses:

    Error:
      description: Error response with details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    PagedProduct:
      description: Paged product response object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedProductResponse'

    SingleProduct:
      description: Single product response object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Product'

    BatchProduct:
      description: Array of products response object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Product'

  schemas:

    ResponsePage:
      type: object
      properties:
        size:
          type: integer
        number:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PagedResponse:
      type: object
      properties:
        content:
          type: array
          items: {}
        page:
          $ref: '#/components/schemas/ResponsePage'

    PagedProductResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    ErrorDetail:
      type: object
      properties:
        status:
          type: integer
        title:
          type: string
        detail:
          type: string
        instance:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ status, message ]

    StockStatus:
      type: string
      enum:
        - IN_STOCK
        - OUT_OF_STOCK
        - LOW_STOCK

    ActiveStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE

    Category:
      type: object
      description: Product category
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    BatchProductIdRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string

    Product:
      type: object
      description: The product object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: BigDecimal
        imageUrls:
          type: array
          items:
            type: string
        stock:
          type: integer
          format: int32
        # TODO: remove stock status
        stockStatus:
          $ref: '#/components/schemas/StockStatus'
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        category:
          $ref: '#/components/schemas/Category'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: BigDecimal
        imageUrls:
          type: array
          items:
            type: string
        stock:
          type: integer
          format: int32
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        category:
          type: string

    ProductCreateRequest:
      type: object
      required: [ name, imageUrls, price, category ]
      description: Request object for adding new product
      properties:
        name:
          type: string
          minLength: 5
        description:
          type: string
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
        price:
          type: BigDecimal
        stock:
          type: integer
          format: int32
        category:
          type: string
          minLength: 5

    CategoryCreateRequest:
      type: object
      required: [ name ]
      description: Request object for creating a new product category
      properties:
        name:
          type: string
          minLength: 5
        description:
          type: string

    CategoryUpdateRequest:
      type: object
      description: Request object for updating an existent product category
      properties:
        name:
          type: string
        description:
          type: string
