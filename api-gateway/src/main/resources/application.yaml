spring:
  application:
    name: ApiGateway

  cloud.gateway.server.webflux.routes:

    - id: auth-service
      uri: http://localhost:8080
      predicates:
        - Path=/api/v1/auth/**
      filters:
        - RemoveRequestHeader=Authorization

    - id: user-service
      uri: http://localhost:8080
      predicates:
        - Path=/api/v1/users/**

    - id: product-service
      uri: http://localhost:8081
      predicates:
        - Path=/api/v1/products/**,/api/v1/categories/**

    - id: cart-service
      uri: http://localhost:8082
      predicates:
        - Path=/api/v1/cart/**

    - id: order-service
      uri: http://localhost:8083
      predicates:
        - Path=/api/v1/orders/**

security:
  oauth2:
    resourceserver:
      jwt:
        secret-key: ${JWT_SECRET}

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8761