spring:

  application:
    name: ApiGateway

  cloud.gateway.server.webflux.routes:

    - id: auth-service
      uri: ${AUTH_SERVICE_URL}
      predicates:
        - Path=/api/v1/auth/**
      filters:
        - RemoveRequestHeader=Authorization

    - id: user-service
      uri: ${USER_SERVICE_URL}
      predicates:
        - Path=/api/v1/users/**

    - id: product-service
      uri: ${PRODUCT_SERVICE_URL}
      predicates:
        - Path=/api/v1/products/**,/api/v1/categories/**

    - id: cart-service
      uri: ${CART_SERVICE_URL}
      predicates:
        - Path=/api/v1/cart/**

    - id: order-service
      uri: ${ORDER_SERVICE_URL}
      predicates:
        - Path=/api/v1/orders/**

security:
  oauth2:
    resourceserver:
      jwt:
        secret-key: ${JWT_SECRET}

jwt:
  secret: ${JWT_SECRET}

server:
  port: ${SERVER_PORT}