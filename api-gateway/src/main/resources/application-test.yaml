spring:
  cloud.gateway.server.webflux.routes:

    - id: auth-service
      uri: http://localhost:${wiremock.server.port}
      predicates:
        - Path=/api/v1/auth/**
      filters:
        - RemoveRequestHeader=Authorization

    - id: user-service
      uri: http://localhost:${wiremock.server.port}
      predicates:
        - Path=/api/v1/users/**

    - id: product-service
      uri: http://localhost:${wiremock.server.port}
      predicates:
        - Path=/api/v1/products/**,/api/v1/categories/**

    - id: cart-service
      uri: http://localhost:${wiremock.server.port}
      predicates:
        - Path=/api/v1/cart/**

    - id: order-service
      uri: http://localhost:${wiremock.server.port}
      predicates:
        - Path=/api/v1/orders/**

server:
  port: 8761
