openapi: 3.0.1
info:
  title: E-Commerce User Service
  description: |
    Handles the user account management part of the e-commerce 
    microservices platform
  contact:
    email: emrin4@gmail.com
  license:
    name: MIT
    url: https://mit-license.org/
  version: 0.0.1

tags:
  - name: user
    description: Account management (login, register, logout, refresh token)
  - name: address
    description: User address management
  - name: card
    description: User payment card management

paths:

  /api/v1/users:

    post:
      tags: [ user ]
      summary: Create user record
      operationId: createUser
      requestBody:
        $ref: '#/components/requestBodies/UserCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/SingleUser'

    get:
      tags: [ user ]
      summary: Get all user record (admin only)
      operationId: getUsers
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PagedUser'
        '403':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/{userId}:

    get:
      tags: [ user ]
      summary: Get user information
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleUser'
        '404':
          $ref: '#/components/responses/ProblemDetail'
        '403':
          $ref: '#/components/responses/ProblemDetail'

    patch:
      tags: [ user ]
      summary: Update user record
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        $ref: '#/components/requestBodies/UserUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SingleUser'
        '404':
          $ref: '#/components/responses/ProblemDetail'
        '403':
          $ref: '#/components/responses/ProblemDetail'

    delete:
      tags: [ user ]
      summary: Delete user record
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/{userId}/addresses:

    post:
      tags: [ address ]
      summary: Create a user address
      operationId: createAddress
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        $ref: '#/components/requestBodies/AddressCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/SingleAddress'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    get:
      tags: [ address ]
      summary: Get all of a user's address
      operationId: getUserAddresses
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          $ref: '#/components/responses/BatchAddress'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/addresses/{addressId}:

    get:
      tags: [ address ]
      summary: Get a user's address by ID
      operationId: getAddress
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/AddressIdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleAddress'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    patch:
      tags: [ address ]
      summary: Update a user's address by ID
      operationId: updateAddress
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/AddressIdPath'
      requestBody:
        $ref: '#/components/requestBodies/AddressUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SingleAddress'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    delete:
      tags: [ address ]
      summary: Delete a user's address by ID
      operationId: deleteAddress
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/AddressIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/addresses/{addressId}/primary:
    post:
      tags: [ address ]
      summary: Set user address as primary
      operationId: setAddressAsPrimary
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/AddressIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/{userId}/cards:
    get:
      tags: [ card ]
      summary: Get user's saved payment cards
      operationId: getPaymentCards
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          $ref: '#/components/responses/BatchCard'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    post:
      tags: [ card ]
      summary: Save user's payment card
      operationId: createPaymentCard
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        $ref: '#/components/requestBodies/CardCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/SingleCard'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/{userId}/cards/{cardId}:
    get:
      tags: [ card ]
      summary: Get user's payment card by ID
      operationId: getPaymentCard
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/CardIdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleCard'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

    delete:
      tags: [ card ]
      summary: Delete user's payment card by ID
      operationId: deletePaymentCard
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/CardIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/{userId}/cards/{cardId}/default:
    patch:
      tags: [ card ]
      summary: Set card as the default payment card
      operationId: setPaymentCardAsDefault
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/CardIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/ProblemDetail'
        '404':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/order-info:
    post:
      tags: [ user ]
      summary: Fetch user information and address information (internal services use)
      operationId: getOrderInfo
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/InternalServiceSecretHeader'
      requestBody:
        $ref: '#/components/requestBodies/OrderInformationRequest'
      responses:
        '200':
          $ref: '#/components/responses/OrderInformation'
        '404':
          $ref: '#/components/responses/ProblemDetail'
        '403':
          $ref: '#/components/responses/ProblemDetail'

  /api/v1/users/cards/{cardId}/token:
    get:
      tags: [ card ]
      summary: Get payment card token (internal services use)
      operationId: getPaymentCardToken
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/InternalServiceSecretHeader'
        - $ref: '#/components/parameters/CardIdPath'
      responses:
        '200':
          $ref: '#/components/responses/CardToken'


components:

  parameters:

    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string

    UserRoleHeader:
      name: X-User-Role
      in: header
      required: true
      schema:
        type: string
        enum:
          - ADMIN
          - CUSTOMER

    InternalServiceSecretHeader:
      name: X-Internal-Service-Secret
      in: header
      required: true
      schema:
        type: string

    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string

    AddressIdPath:
      name: addressId
      in: path
      required: true
      schema:
        type: string

    CardIdPath:
      name: cardId
      in: path
      required: true
      schema:
        type: string

    PageNumberQuery:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0

    PageSizeQuery:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 10

  requestBodies:

    UserCreateRequest:
      description: Request object to create new user
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserCreateRequest'

    UserUpdateRequest:
      description: Request object to update user information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserUpdateRequest'

    AddressCreateRequest:
      description: Request object to create new address
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AddressCreateRequest'

    AddressUpdateRequest:
      description: Request object to update address
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AddressUpdateRequest'

    CardCreateRequest:
      description: Request object to save a new payment card
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CardCreateRequest'

    OrderInformationRequest:
      description: Request for user and address information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderInformationRequest'

  responses:

    NoContent:
      description: No content response
      content: {}

    ProblemDetail:
      description: Api error detail response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    SingleUser:
      description: User object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/User'

    PagedUser:
      description: Paged user response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedUserResponse'


    SingleAddress:
      description: Address object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Address'

    BatchAddress:
      description: Addresses
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Address'

    SingleCard:
      description: Card information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Card'

    BatchCard:
      description: Cards information
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Card'

    OrderInformation:
      description: User and address information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderInformation'

    CardToken:
      description: Card token information
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CardToken'

  schemas:

    ResponsePage:
      type: object
      properties:
        size:
          type: integer
        number:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PagedResponse:
      type: object
      properties:
        content:
          type: array
          items: {}
        page:
          $ref: '#/components/schemas/ResponsePage'

    PagedUserResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/User'

    ProblemDetail:
      type: object
      properties:
        title:
          type: string
          example: "Not Found"
        status:
          type: integer
          example: 404
        detail:
          type: string
          example: "Order not found with id: 123"
        instance:
          type: string
          format: uri
          example: "/api/v1/orders/123"
      required: [ status ]

    UserCreateRequest:
      type: object
      required: [ id, email, firstName, lastName, phone ]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddressCreateRequest:
      type: object
      description: Request body for adding a new address
      required: [ number, street, city, state, country, postalCode ]
      properties:
        number:
          type: string
          example: 42
          description: Street number
        street:
          type: string
          example: Maple Avenue
          description: Street name
        city:
          type: string
          example: Austin
        state:
          type: string
          example: Texas
        country:
          type: string
          example: United States
        postalCode:
          type: string
          example: 78701


    AddressUpdateRequest:
      type: object
      description: Request body for updating address
      properties:
        number:
          type: string
          description: Street number
        street:
          type: string
          example: Crescent Boulevard
          description: Street name
        city:
          type: string
          example: Portland
        state:
          type: string
          example: Oregon
        country:
          type: string
          example: United States
        postalCode:
          type: string
          example: 97201

    Address:
      type: object
      description: The user's shipping address
      properties:
        id:
          type: string
        userId:
          description: Identifier of the user this address belongs to
          type: string
        streetNumber:
          type: string
          description: Street number
        streetName:
          type: string
          description: Street name
        city:
          type: string
        state:
          type: string
        country:
          type: string
        postalCode:
          type: string
        isPrimary:
          type: boolean

    CardType:
      type: string
      enum:
        - VISA
        - AMEX
        - MASTERCARD

    Card:
      type: object
      description: Payment card
      properties:
        id:
          type: string
        cardHolderName:
          type: string
        lastFourDigits:
          type: string
          minLength: 4
          maxLength: 4
        cardType:
          $ref: '#/components/schemas/CardType'
        expiryMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 12
        expiryYear:
          type: integer
          format: int32
          minimum: 1900
          maximum: 2100
        isDefault:
          type: boolean

    CardCreateRequest:
      type: object
      description: Payment card creation request
      required: [ cardHolderName, cardNumber, expiryMonth, expiryYear, cvv ]
      properties:
        cardHolderName:
          type: string
        cardNumber:
          type: string
        expiryMonth:
          type: integer
          minimum: 1
          maximum: 31
        expiryYear:
          type: integer
          minimum: 1000
          maximum: 9999
        cvv:
          type: integer

    CardToken:
      type: object
      description: Card token information
      properties:
        cardId:
          type: string
        token:
          type: string
        cardType:
          $ref: '#/components/schemas/CardType'
        expiryMonth:
          type: integer
          minimum: 1
          maximum: 31
        expiryYear:
          type: integer
          minimum: 1000
          maximum: 9999

    OrderInformation:
      type: object
      properties:
        userId:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    OrderInformationRequest:
      type: object
      properties:
        userId:
          type: string
        addressId:
          type: string
