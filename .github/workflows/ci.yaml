name: Github action CI
on:
  push:
    branches: [ main, dev ]

  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.service }})
    runs-on:
      labels: [ self-hosted, spring ]

    strategy:
      matrix:
        service: [ auth-service, product-service, user-service ]
      fail-fast: false

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execution permission to maven
        run: |
          chmod +x ./mvnw

      - name: Run tests
        run: |
          ./mvnw clean test

      - name: Package jar
        if: success()
        run: |
          ./mvnw package

