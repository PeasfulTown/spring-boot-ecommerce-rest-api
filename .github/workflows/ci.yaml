name: Github action CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test
    runs-on:
      labels: [ self-hosted, spring ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execution permission to maven
        working-directory: ${{github.workspace}}/product-service
        run: |
          chmod +x ./mvnw

      - name: Run tests
        working-directory: ${{github.workspace}}/product-service
        run: |
          ./mvnw clean test

      - name: Package jar
        if: success()
        working-directory: ${{github.workspace}}/product-service
        run: |
          ./mvnw package

